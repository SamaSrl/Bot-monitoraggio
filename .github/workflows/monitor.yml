name: Bot Monitoraggio FusionSolar

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Esegui il Bot di Monitoraggio API
        env:
          FUSIONSOLAR_API_USER: ${{ secrets.FUSIONSOLAR_API_USER }}
          FUSIONSOLAR_API_KEY: ${{ secrets.FUSIONSOLAR_API_KEY }}
        run: |
          python src/main.py

      - name: Salva Report come Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-impianti
          path: report_impianti.json
