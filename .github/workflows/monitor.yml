name: FusionSolar Monitor PDF Generator

on:
  schedule:
    - cron: '0 7 * * *'  # Esegue lo script ogni giorno alle 07:00 UTC
  workflow_dispatch:      # Permette di avviare l'esecuzione manualmente da GitHub

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests fpdf2

      - name: Esegui main.py
        env:
          FUSIONSOLAR_API_USER: ${{ secrets.FUSIONSOLAR_API_USER }}
          FUSIONSOLAR_API_KEY: ${{ secrets.FUSIONSOLAR_API_KEY }}
        run: python main.py

      - name: Carica il PDF generato come Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Report-Impianti-FusionSolar
          path: report_impianti.pdf
          retention-days: 30
