Ecco il file .github/workflows/main.yml completo, aggiornato per utilizzare il nuovo script basato su API senza browser/Playwright.

.github/workflows/monitor.yml
YAML
name: Bot Monitoraggio FusionSolar

on:
  workflow_dispatch: # Ti permette di avviare il bot manualmente dalla scheda Actions
  schedule:
    - cron: '0 8 * * *' # (Opzionale) Esegue il bot automaticamente ogni giorno alle 08:00 UTC

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Esegui il Bot di Monitoraggio API
        env:
          FUSIONSOLAR_API_USER: ${{ secrets.FUSIONSOLAR_API_USER }}
          FUSIONSOLAR_API_KEY: ${{ secrets.FUSIONSOLAR_API_KEY }}
        run: |
          python src/main.py
