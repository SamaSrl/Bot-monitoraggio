name: Monitoraggio Impianti FusionSolar

on:
  push:
    branches:
      - main
  schedule:
    # Esegue il bot automaticamente ogni 6 ore (ore 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permette l'esecuzione manuale dal pannello di GitHub

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      # 1. Scarica il repository
      - name: Checkout del codice
        uses: actions/checkout@v4

      # 2. Configura l'ambiente Python
      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Installa le dipendenze
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          playwright install --with-deps chromium

      # 4. Esegue lo script Python
      - name: Esegui il Bot di Monitoraggio
        env:
          FUSIONSOLAR_USER: "s.agnolet@omniaenergy.eu"
          FUSIONSOLAR_PWD: ${{ secrets.FUSIONSOLAR_PWD }}
        run: |
          python src/main.py

      # 5. Salva e aggiorna il report sul repository
      - name: Salva e carica i dati aggiornati
        if: always() # Viene eseguito anche se lo script precedente fallisce per salvare eventuali report parziali
        run: |
          git config --global user.name "FusionSolar Bot"
          git config --global user.email "bot@omniaenergy.eu"
          
          # Aggiunge il report generato
          git add REPORT_ALLARMI.md || true
          
          # Aggiunge eventuali screenshot di errore generati durante il crash
          git add error_data_screenshot.png error_screenshot.png || true
          
          # Effettua il commit solo se ci sono modifiche effettive
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornato report stato impianti [Automazione]" && git push origin main)

      # 6. Carica lo screenshot come Artefatto in caso di errore per un rapido debug
      - name: Upload screenshot di errore
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: |
            error_data_screenshot.png
            error_screenshot.png
