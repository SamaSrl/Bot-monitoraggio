name: Monitoraggio FusionSolar

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Esegui il Bot di Monitoraggio
        env:
          FUSIONSOLAR_USER: ${{ secrets.FUSIONSOLAR_USER }}
          FUSIONSOLAR_PWD: ${{ secrets.FUSIONSOLAR_PWD }}
        run: python src/main.py

      - name: Salva e carica i dati aggiornati su GitHub
        if: always()
        run: |
          git config --global user.name "FusionSolar Bot"
          git config --global user.email "bot@github-actions.local"
          git add REPORT_ALLARMI.md dashboard_check.png || true
          git commit -m "Aggiornamento report e screenshot [skip ci]" || true
          git push origin main || true
