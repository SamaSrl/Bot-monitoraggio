name: FusionSolar Monitor PDF Generator

on:
  schedule:
    - cron: '0 7 * * *'  # Esegue ogni giorno alle 07:00 UTC
  workflow_dispatch:      # Permette l'avvio manuale da GitHub

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests fpdf2

      # 1. Specifichiamo di lavorare dentro la cartella 'src'
      - name: Esegui main.py
        working-directory: ./src
        env:
          FUSIONSOLAR_API_USER: ${{ secrets.FUSIONSOLAR_API_USER }}
          FUSIONSOLAR_API_KEY: ${{ secrets.FUSIONSOLAR_API_KEY }}
        run: python main.py

      # 2. Indichiamo il percorso del PDF generato dentro 'src'
      - name: Carica il PDF generato come Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Report-Impianti-FusionSolar
          path: src/report_impianti.pdf
          retention-days: 30
