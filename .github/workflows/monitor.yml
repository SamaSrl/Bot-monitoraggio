name: FusionSolar Monitor Cron

on:
  schedule:
    # Gira ogni 30 minuti (gli orari usano lo standard UTC)
    - cron: '*/30 * * * *'
  workflow_dispatch: # Ti permette anche di avviarlo manualmente con un clic da GitHub

permissions:
  contents: write # Forza i permessi di scrittura per salvare il file JSON

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Esegui il Bot di Monitoraggio
      env:
        FUSIONSOLAR_USER: ${{ secrets.FUSIONSOLAR_USER }}
        FUSIONSOLAR_PASSWORD: ${{ secrets.FUSIONSOLAR_PASSWORD }}
      run: python src/main.py

   - name: Salva e carica i dati aggiornati
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "FusionSolar Bot"
        git config --global user.email "bot@fusionsolar.local"
        git add web_app/data/dashboard.json
        # Usiamo il token per autenticare il push
        git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornamento dati impianti" && git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main)